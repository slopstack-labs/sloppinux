<svg width="3840" height="2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wallpaper background gradients -->
    <linearGradient id="base" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#080318"/>
      <stop offset="45%"  stop-color="#1a0870"/>
      <stop offset="100%" stop-color="#3a0ca3"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="80%" cy="15%" r="45%">
      <stop offset="0%"   stop-color="#3ecfcf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3ecfcf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="20%" cy="80%" r="40%">
      <stop offset="0%"   stop-color="#9b5de5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#9b5de5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#4361ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4361ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Logo gradients (prefixed to avoid conflicts) -->
    <linearGradient id="logo_topA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3ecfcf"/>
      <stop offset="100%" stop-color="#6a4fd4"/>
    </linearGradient>
    <linearGradient id="logo_topB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9b5de5"/>
      <stop offset="100%" stop-color="#4361ee"/>
    </linearGradient>
    <linearGradient id="logo_topC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5e60ce"/>
      <stop offset="100%" stop-color="#3a0ca3"/>
    </linearGradient>
    <radialGradient id="logo_bgFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a8b4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8b4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="3840" height="2160" fill="url(#base)"/>
  <rect width="3840" height="2160" fill="url(#glowTeal)"/>
  <rect width="3840" height="2160" fill="url(#glowPurple)"/>
  <rect width="3840" height="2160" fill="url(#glowBlue)"/>

  <!-- Logo centered at (1920, 1080), rendered at 480px -->
  <svg x="1680" y="840" width="480" height="480" viewBox="0 0 1040 1040">
    <circle cx="520" cy="520" r="400" fill="url(#logo_bgFade)"/>
    <g transform="translate(556, 638) rotate(6)">
      <polygon points="0,120 260,0 260,64 0,184"    fill="#1a0870" opacity="0.75"/>
      <polygon points="-260,0 0,120 0,184 -260,64"  fill="#2d0f8f" opacity="0.75"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="url(#logo_topC)" opacity="0.85"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="none" stroke="#6de8ff" stroke-width="3.6" opacity="0.7"/>
      <polygon points="0,-120 260,0 100,40 -100,-60" fill="white" opacity="0.07"/>
    </g>
    <g transform="translate(484, 488) rotate(-5)">
      <polygon points="0,120 260,0 260,64 0,184"    fill="#3a0a8a" opacity="0.75"/>
      <polygon points="-260,0 0,120 0,184 -260,64"  fill="#560bad" opacity="0.75"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="url(#logo_topB)" opacity="0.85"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="none" stroke="#6de8ff" stroke-width="3.6" opacity="0.8"/>
      <polygon points="0,-120 260,0 100,40 -100,-60" fill="white" opacity="0.08"/>
    </g>
    <g transform="translate(528, 338) rotate(3)">
      <polygon points="0,120 260,0 260,64 0,184"    fill="#0077a8" opacity="0.65"/>
      <polygon points="-260,0 0,120 0,184 -260,64"  fill="#0096c7" opacity="0.65"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="url(#logo_topA)" opacity="0.9"/>
      <polygon points="0,-120 260,0 0,120 -260,0"   fill="none" stroke="#6de8ff" stroke-width="4" opacity="0.9"/>
      <polygon points="0,-120 160,20 60,70 -120,-40" fill="white" opacity="0.13"/>
    </g>
  </svg>
</svg>
